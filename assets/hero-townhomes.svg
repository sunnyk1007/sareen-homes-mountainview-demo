<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Illustration of luxury four-level brick townhomes">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8eef7"/>
      <stop offset="55%" stop-color="#d6e2f1"/>
      <stop offset="100%" stop-color="#c7d5e7"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#708964"/>
      <stop offset="100%" stop-color="#4e6648"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#757c86"/>
      <stop offset="100%" stop-color="#4f5660"/>
    </linearGradient>
    <linearGradient id="brick" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b5b49"/>
      <stop offset="100%" stop-color="#7d4337"/>
    </linearGradient>
    <linearGradient id="brick2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a4f41"/>
      <stop offset="100%" stop-color="#6c3a30"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7d2cb"/>
      <stop offset="100%" stop-color="#bbb6ad"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#273a59"/>
      <stop offset="100%" stop-color="#111c2f"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-opacity=".2"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <ellipse cx="1330" cy="115" rx="95" ry="36" fill="#ffffff" opacity=".62"/>
  <ellipse cx="180" cy="140" rx="120" ry="42" fill="#ffffff" opacity=".58"/>
  <ellipse cx="430" cy="120" rx="90" ry="30" fill="#ffffff" opacity=".52"/>

  <rect x="0" y="645" width="1600" height="255" fill="url(#ground)"/>
  <rect x="0" y="585" width="1600" height="105" fill="url(#road)"/>
  <rect x="0" y="675" width="1600" height="42" fill="#d1c8ba"/>
  <rect x="0" y="664" width="1600" height="9" fill="#efe8de"/>
  <g opacity=".58">
    <rect x="60" y="628" width="170" height="8" rx="4" fill="#d9dde3"/>
    <rect x="320" y="628" width="170" height="8" rx="4" fill="#d9dde3"/>
