      <stop offset="0%" stop-color="#edf2f8"/>
      <stop offset="100%" stop-color="#d7e1ee"/>
    </linearGradient>
    <linearGradient id="lawn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7d9272"/>
      <stop offset="100%" stop-color="#5d7855"/>
